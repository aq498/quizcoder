<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timed MCQ Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        /* JSON Input Screen */
        .json-input-screen textarea {
            width: 100%;
            height: 300px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .json-input-screen textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.4);
        }

        .center {
            text-align: center;
            margin-top: 20px;
        }

        .error {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
        }

        /* Quiz Screen */
        .quiz-screen {
            display: none;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .progress-info {
            font-size: 14px;
            color: #666;
            font-weight: 600;
        }

        .timer {
            background: #ff6b6b;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            min-width: 80px;
            text-align: center;
            transition: background 0.3s;
        }

        .timer.warning {
            background: #ffa502;
            animation: pulse 1s infinite;
        }

        .timer.danger {
            background: #e74c3c;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
            border-left: 5px solid #667eea;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 700;
            color: #2d3436;
            line-height: 1.5;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            padding: 20px;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option-btn.correct {
            background: #2ecc71;
            border-color: #27ae60;
            color: white;
        }

        .option-btn.wrong {
            background: #e74c3c;
            border-color: #c0392b;
            color: white;
        }

        .option-btn.reveal-correct {
            background: #2ecc71;
            border-color: #27ae60;
            color: white;
            animation: correctPulse 0.5s;
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .option-label {
            display: inline-block;
            width: 32px;
            height: 32px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 32px;
            margin-right: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .option-content {
            display: flex;
            align-items: center;
        }

        .skip-btn {
            background: #1B62F2;
            color: white;
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .skip-btn:hover:not(:disabled) {
            background: #064BD6;
            transform: translateY(-1px);
        }

        .skip-btn:disabled {
             background: #BFBFBF;
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Results Screen */
        .results-screen {
            display: none;
            text-align: center;
        }

        .results-title {
            font-size: 2.5rem;
            color: #667eea;
            margin-bottom: 10px;
        }

        .score-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .score-card {
            padding: 25px;
            border-radius: 16px;
            color: white;
            font-weight: 700;
        }

        .score-card.correct { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .score-card.wrong { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .score-card.skipped { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .score-card.total { background: linear-gradient(135deg, #667eea, #764ba2); }

        .score-number {
            font-size: 3rem;
            display: block;
            margin-bottom: 5px;
        }

        .score-label {
            font-size: 1rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .percentage {
            font-size: 4rem;
            font-weight: 800;
            color: #667eea;
            margin: 20px 0;
        }

        .feedback {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }

        /* Export Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5rem;
            color: #667eea;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: #f0f0f0;
        }

        .export-textarea {
            width: 100%;
            flex: 1;
            min-height: 300px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: none;
            line-height: 1.6;
            white-space: pre;
            overflow: auto;
        }

        .modal-actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            .score-grid {
                grid-template-columns: 1fr;
            }
            h1 { font-size: 1.8rem; }
            .question-text { font-size: 1.1rem; }
            .container { padding: 25px; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <!-- JSON Input Screen -->
    <div class="json-input-screen" id="inputScreen">
        <h1>🎯 Quiz Loader</h1>
        <p class="subtitle">Paste your quiz JSON below and click Start</p>
        
        <textarea id="jsonInput" placeholder='{
  "title": "General Knowledge Quiz",
  "timePerQuestion": 15,
  "allowSkip": true,
  "questions": [
    {
      "question": "What is the capital of France?",
      "options": ["London", "Berlin", "Paris", "Madrid"],
      "correctAnswer": 2
    }
  ]
}'></textarea>
        
        <div class="error" id="errorMsg"></div>
        
        <div class="center">
            <button class="btn btn-primary" onclick="loadQuiz()">Start Quiz</button>
            <button class="btn btn-secondary" onclick="loadExample()">Load Example</button>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div class="quiz-screen" id="quizScreen">
        <div class="quiz-header">
            <div class="progress-info">
                Question <span id="currentQ">1</span> / <span id="totalQ">5</span>
            </div>
            <div class="timer" id="timer">15</div>
        </div>

        <div class="question-card">
            <div class="question-text" id="questionText">Question goes here?</div>
        </div>

        <div class="options-grid" id="optionsGrid">
            <!-- Options injected by JS -->
        </div>

        <button class="skip-btn" id="skipBtn" onclick="skipQuestion()">⏭ Skip Question</button>
    </div>

    <!-- Results Screen -->
    <div class="results-screen" id="resultsScreen">
        <div class="results-title">🏆 Quiz Complete!</div>
        <div class="percentage" id="percentage">0%</div>
        <div class="feedback" id="feedback">Great job!</div>
        
        <div class="score-grid">
            <div class="score-card correct">
                <span class="score-number" id="scoreCorrect">0</span>
                <span class="score-label">Correct</span>
            </div>
            <div class="score-card wrong">
                <span class="score-number" id="scoreWrong">0</span>
                <span class="score-label">Wrong</span>
            </div>
            <div class="score-card skipped">
                <span class="score-number" id="scoreSkipped">0</span>
                <span class="score-label">Skipped</span>
            </div>
            <div class="score-card total">
                <span class="score-number" id="scoreTotal">0</span>
                <span class="score-label">Total Questions</span>
            </div>
        </div>

        <div class="center">
            <button class="btn btn-success" onclick="openExport()">📄 Export Data</button>
            <button class="btn btn-primary" onclick="restart()">Try Another Quiz</button>
        </div>
    </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">📋 Quiz Results Export</div>
            <button class="modal-close" onclick="closeExport()">✕</button>
        </div>
        <textarea class="export-textarea" id="exportArea" readonly></textarea>
        <div class="modal-actions">
            <button class="btn btn-primary" onclick="copyExport()">📋 Copy to Clipboard</button>
            <button class="btn btn-success" onclick="downloadExport()">💾 Download .txt</button>
            <button class="btn btn-secondary" onclick="closeExport()">Close</button>
        </div>
    </div>
</div>

<script>
    let quizData = null;
    let currentQuestion = 0;
    let timerInterval = null;
    let timeLeft = 0;
    let scores = {
        correct: 0,
        wrong: 0,
        skipped: 0,
        total: 0
    };
    let answered = false;
    let detailedResults = []; // Stores per-question results for export

    const labels = ['A', 'B', 'C', 'D'];

    function showError(msg) {
        document.getElementById('errorMsg').textContent = msg;
    }

    function loadExample() {
        const example = {
            "title": "Science & Nature Quiz",
            "timePerQuestion": 10,
            "allowSkip": true,
            "questions": [
                {
                    "question": "What is the chemical symbol for gold?",
                    "options": ["Go", "Gd", "Au", "Ag"],
                    "correctAnswer": 2
                },
                {
                    "question": "Which planet is known as the Red Planet?",
                    "options": ["Venus", "Mars", "Jupiter", "Saturn"],
                    "correctAnswer": 1
                },
                {
                    "question": "What is the hardest natural substance on Earth?",
                    "options": ["Gold", "Iron", "Diamond", "Platinum"],
                    "correctAnswer": 2
                },
                {
                    "question": "How many bones do sharks have in their bodies?",
                    "options": ["0", "50", "100", "206"],
                    "correctAnswer": 0
                },
                {
                    "question": "What gas do plants absorb from the atmosphere?",
                    "options": ["Oxygen", "Carbon Dioxide", "Nitrogen", "Hydrogen"],
                    "correctAnswer": 1
                }
            ]
        };
        document.getElementById('jsonInput').value = JSON.stringify(example, null, 2);
        showError('');
    }

    function validateQuiz(data) {
        if (!data.questions || !Array.isArray(data.questions) || data.questions.length === 0) {
            throw new Error('Quiz must have at least one question in a "questions" array.');
        }
        if (!data.timePerQuestion || typeof data.timePerQuestion !== 'number' || data.timePerQuestion < 1) {
            throw new Error('"timePerQuestion" must be a positive number (seconds).');
        }
        
        data.questions.forEach((q, i) => {
            if (!q.question || typeof q.question !== 'string') {
                throw new Error(`Question ${i + 1} is missing or invalid.`);
            }
            if (!q.options || !Array.isArray(q.options) || q.options.length !== 4) {
                throw new Error(`Question ${i + 1} must have exactly 4 options in an array.`);
            }
            if (typeof q.correctAnswer !== 'number' || q.correctAnswer < 0 || q.correctAnswer > 3) {
                throw new Error(`Question ${i + 1} "correctAnswer" must be a number 0-3 (index of correct option).`);
            }
        });

        return true;
    }

    function loadQuiz() {
        const raw = document.getElementById('jsonInput').value.trim();
        if (!raw) {
            showError('Please paste a quiz JSON first.');
            return;
        }

        try {
            const data = JSON.parse(raw);
            validateQuiz(data);
            quizData = data;
            
            if (typeof quizData.allowSkip !== 'boolean') quizData.allowSkip = true;
            
            scores = { correct: 0, wrong: 0, skipped: 0, total: quizData.questions.length };
            detailedResults = [];
            currentQuestion = 0;
            
            document.getElementById('inputScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            document.getElementById('resultsScreen').style.display = 'none';
            
            showQuestion();
        } catch (e) {
            showError('Invalid JSON: ' + e.message);
        }
    }

    function showQuestion() {
        answered = false;
        const q = quizData.questions[currentQuestion];
        
        document.getElementById('currentQ').textContent = currentQuestion + 1;
        document.getElementById('totalQ').textContent = quizData.questions.length;
        document.getElementById('questionText').textContent = q.question;
        
        const skipBtn = document.getElementById('skipBtn');
        skipBtn.style.display = quizData.allowSkip ? 'block' : 'none';
        skipBtn.disabled = false;
        
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = '';
        
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.onclick = () => selectAnswer(idx);
            btn.innerHTML = `
                <div class="option-content">
                    <span class="option-label">${labels[idx]}</span>
                    <span>${escapeHtml(opt)}</span>
                </div>
            `;
            grid.appendChild(btn);
        });
        
        startTimer();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = quizData.timePerQuestion;
        const timerEl = document.getElementById('timer');
        timerEl.textContent = timeLeft;
        timerEl.className = 'timer';
        
        timerInterval = setInterval(() => {
            timeLeft--;
            timerEl.textContent = timeLeft;
            
            if (timeLeft <= 5) {
                timerEl.className = 'timer danger';
            } else if (timeLeft <= 10) {
                timerEl.className = 'timer warning';
            }
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timeUp();
            }
        }, 1000);
    }

    function recordResult(selectedIndex, status) {
        const q = quizData.questions[currentQuestion];
        detailedResults.push({
            questionIndex: currentQuestion,
            question: q.question,
            options: q.options,
            selectedIndex: selectedIndex, // -1 for skipped/timeout, 0-3 for selected
            correctIndex: q.correctAnswer,
            status: status // 'correct', 'wrong', 'skipped', 'timeout'
        });
    }

    function timeUp() {
        if (answered) return;
        answered = true;
        disableAll();
        scores.wrong++;
        recordResult(-1, 'timeout');
        revealCorrect();
        setTimeout(nextQuestion, 2000);
    }

    function selectAnswer(index) {
        if (answered) return;
        answered = true;
        clearInterval(timerInterval);
        disableAll();
        
        const q = quizData.questions[currentQuestion];
        const buttons = document.querySelectorAll('.option-btn');
        
        if (index === q.correctAnswer) {
            buttons[index].classList.add('correct');
            scores.correct++;
            recordResult(index, 'correct');
        } else {
            buttons[index].classList.add('wrong');
            buttons[q.correctAnswer].classList.add('reveal-correct');
            scores.wrong++;
            recordResult(index, 'wrong');
        }
        
        setTimeout(nextQuestion, 1500);
    }

    function skipQuestion() {
        if (answered) return;
        answered = true;
        clearInterval(timerInterval);
        disableAll();
        scores.skipped++;
        recordResult(-1, 'skipped');
        revealCorrect();
        setTimeout(nextQuestion, 1000);
    }

    function revealCorrect() {
        const q = quizData.questions[currentQuestion];
        const buttons = document.querySelectorAll('.option-btn');
        buttons[q.correctAnswer].classList.add('reveal-correct');
    }

    function disableAll() {
        document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
        document.getElementById('skipBtn').disabled = true;
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < quizData.questions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quizScreen').style.display = 'none';
        document.getElementById('resultsScreen').style.display = 'block';
        
        document.getElementById('scoreCorrect').textContent = scores.correct;
        document.getElementById('scoreWrong').textContent = scores.wrong;
        document.getElementById('scoreSkipped').textContent = scores.skipped;
        document.getElementById('scoreTotal').textContent = scores.total;
        
        const rawPct = ((scores.correct - 0.5 * scores.wrong) / scores.total) * 100;
        const pct = Math.max(0, rawPct).toFixed(1);
        document.getElementById('percentage').textContent = pct + '%';
        
        let feedback = '';
        if (pct === 100) feedback = 'Perfect score! Outstanding! 🌟';
        else if (pct >= 80) feedback = 'Excellent work! 🎉';
        else if (pct >= 60) feedback = 'Good job! Keep learning! 👍';
        else if (pct >= 40) feedback = 'Not bad, but room for improvement! 📚';
        else feedback = 'Keep practicing, you\'ll get better! 💪';
        
        document.getElementById('feedback').textContent = feedback;
    }

    function generateExportText() {
        let lines = [];
        lines.push('=====================================');
        lines.push('         QUIZ RESULTS EXPORT');
        lines.push('=====================================');
        lines.push(`Quiz Title: ${quizData.title || 'Untitled Quiz'}`);
        lines.push(`Total Questions: ${scores.total}`);
        lines.push(`Correct: ${scores.correct} | Wrong: ${scores.wrong} | Skipped/Timeout: ${scores.skipped}`);
        const rawPct = ((scores.correct - 0.5 * scores.wrong) / scores.total) * 100;
        const pct = Math.max(0, rawPct).toFixed(1);
        lines.push(`Score: ${pct}%`);
        lines.push('=====================================');
        lines.push('');

        detailedResults.forEach((r, i) => {
            lines.push(`question ${i + 1}`);
            lines.push(r.question);
            
            r.options.forEach((opt, idx) => {
                const isSelected = (r.selectedIndex === idx);
                const marker = isSelected ? '(selected)' : '';
                // Pad option text to align markers roughly
                lines.push(`${labels[idx]}: ${opt}${marker ? ' ' + marker : ''}`);
            });
            
            lines.push(`Answer: ${labels[r.correctIndex]}`);
            
            if (r.status === 'correct') {
                lines.push('correct');
            } else if (r.status === 'wrong') {
                lines.push('wrong');
            } else if (r.status === 'skipped') {
                lines.push('skipped');
            } else if (r.status === 'timeout') {
                lines.push('timeout (time ran out)');
            }
            
            lines.push(''); // blank line between questions
        });

        return lines.join('\n');
    }

    function openExport() {
        const text = generateExportText();
        document.getElementById('exportArea').value = text;
        document.getElementById('exportModal').classList.add('active');
    }

    function closeExport() {
        document.getElementById('exportModal').classList.remove('active');
    }

    function copyExport() {
        const area = document.getElementById('exportArea');
        area.select();
        document.execCommand('copy');
        
        const btn = event.target;
        const original = btn.textContent;
        btn.textContent = '✅ Copied!';
        setTimeout(() => btn.textContent = original, 1500);
    }

    function downloadExport() {
        const text = document.getElementById('exportArea').value;
        const title = (quizData.title || 'quiz-results').replace(/\s+/g, '-').toLowerCase();
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${title}-results.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function restart() {
        document.getElementById('inputScreen').style.display = 'block';
        document.getElementById('quizScreen').style.display = 'none';
        document.getElementById('resultsScreen').style.display = 'none';
        document.getElementById('jsonInput').value = '';
        showError('');
        detailedResults = [];
    }

    // Close modal on overlay click
    document.getElementById('exportModal').addEventListener('click', function(e) {
        if (e.target === this) closeExport();
    });
</script>

</body>
</html>
